services:
  rentmap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentmap-server
    expose:
      - "8000"
    networks:
      - proxy
    volumes:
      - ./data:/app/data
      - ./web:/app/web
      - ./scripts:/app/scripts
    environment:
      - TZ=Asia/Seoul
      - RENTMAP_AREA_NAME=${RENTMAP_AREA_NAME:-아주대}
      - RENTMAP_CENTER_LAT=${RENTMAP_CENTER_LAT:-37.280062}
      - RENTMAP_CENTER_LNG=${RENTMAP_CENTER_LNG:-127.043688}
      - RENTMAP_RADIUS_KM=${RENTMAP_RADIUS_KM:-3.0}
      - RENTMAP_MAX_DEPOSIT=${RENTMAP_MAX_DEPOSIT:-999999}
      - RENTMAP_MAX_RENT=${RENTMAP_MAX_RENT:-999999}
      # Daangn region IDs (comma-separated). Default = Suwon Gwonseon-gu (아주대 주변).
      # To use in another city: find IDs at daangn.com/kr/realty/?in=x-XXXX and set here.
      - RENTMAP_DAANGN_REGION_IDS=${RENTMAP_DAANGN_REGION_IDS:-}
      # Naver Land URLs (pipe "|" separated). Leave empty to auto-generate a viewport
      # grid from CENTER_LAT/LNG + RADIUS_KM. Set only to override with specific URLs.
      # NOTE: comma cannot be used as separator — ms= params contain commas.
      - RENTMAP_NAVER_URLS=${RENTMAP_NAVER_URLS:-}
      # Explicit Naver cortarNos (dong-level admin codes) to force-paginate, on
      # top of whatever the grid resolves to. Necessary because Naver's
      # ms= → cortarNo resolution is non-deterministic — a tile near 원천동 can
      # land on 분당 instead, silently dropping that dong's listings. The list
      # below is the union of every cortarNo we've observed our 3km Ajou grid
      # land on across multiple runs (영통/매탄/원천/우만/이의/하동 ...).
      - RENTMAP_NAVER_CORTARNOS=${RENTMAP_NAVER_CORTARNOS:-4111710100,4111710200,4111710300,4111710400,4111710500,4111710600,4111514000,4111514100,4111513300,4111513500,4111513800,4111513900,4111512000,4111313700,4111312600,4111113000,4111113400,4111113600,4111113900}
    restart: unless-stopped

  # Naver crawler runs in its own playwright-based container, in lock-step
  # with the main container's hourly crawl. Shares the data volume so the
  # main container's gen-web cron picks up the freshly-written CSV. Not on
  # the proxy network — only Caddy needs to reach the server container.
  rentmap-naver:
    build:
      context: .
      dockerfile: Dockerfile.naver
    container_name: rentmap-naver
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    environment:
      - TZ=Asia/Seoul
      - RENTMAP_AREA_NAME=${RENTMAP_AREA_NAME:-아주대}
      - RENTMAP_CENTER_LAT=${RENTMAP_CENTER_LAT:-37.280062}
      - RENTMAP_CENTER_LNG=${RENTMAP_CENTER_LNG:-127.043688}
      - RENTMAP_RADIUS_KM=${RENTMAP_RADIUS_KM:-3.0}
      - RENTMAP_MAX_DEPOSIT=${RENTMAP_MAX_DEPOSIT:-999999}
      - RENTMAP_MAX_RENT=${RENTMAP_MAX_RENT:-999999}
      # Same Naver URL override — naver container uses env vars to generate its grid.
      - RENTMAP_NAVER_URLS=${RENTMAP_NAVER_URLS:-}
      # Same cortarNo backstop as above — the rentmap-naver container is where
      # actual paginating happens, so the env var matters here.
      - RENTMAP_NAVER_CORTARNOS=${RENTMAP_NAVER_CORTARNOS:-4111710100,4111710200,4111710300,4111710400,4111710500,4111710600,4111514000,4111514100,4111513300,4111513500,4111513800,4111513900,4111512000,4111313700,4111312600,4111113000,4111113400,4111113600,4111113900}
    restart: unless-stopped

networks:
  proxy:
    external: true
