services:
  rentmap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentmap-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./web:/app/web
      - ./scripts:/app/scripts
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped

  # Naver crawler runs in its own playwright-based container at a slower
  # cadence (every 3 hours at :30 KST). Shares the data volume so the main
  # container's hourly gen-web picks up the freshly-written CSV.
  rentmap-naver:
    build:
      context: .
      dockerfile: Dockerfile.naver
    container_name: rentmap-naver
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
