<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dabang Ajou Search Area</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQp6pSMTuJ5iQ9fQh8+1tq2sGk6g6sE="
    crossorigin=""
  >
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: min(360px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.14);
      color: #172033;
      line-height: 1.45;
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
    }

    .panel p {
      margin: 6px 0;
      font-size: 13px;
    }

    .legend {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      font-size: 13px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 18px;
      height: 12px;
      border: 2px solid #2563eb;
      background: rgba(37, 99, 235, 0.14);
      border-radius: 2px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <aside class="panel">
    <h1>다방 아주대 인근 크롤링 범위</h1>
    <p>중심 좌표: 37.2772634, 127.0451149</p>
    <p>남서쪽: 37.2736, 127.0408</p>
    <p>북동쪽: 37.2809, 127.0494</p>
    <p>대략 가로 약 760m, 세로 약 810m 범위입니다.</p>
    <div class="legend">
      <div class="legend-row"><span class="swatch"></span><span>검색 bbox</span></div>
      <div class="legend-row"><span class="dot"></span><span>검색 중심점</span></div>
    </div>
  </aside>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const southWest = [37.2736, 127.0408];
    const northEast = [37.2809, 127.0494];
    const center = [37.2772634, 127.0451149];
    const bounds = L.latLngBounds(southWest, northEast);

    const map = L.map("map", {
      zoomControl: true,
      scrollWheelZoom: true
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.rectangle(bounds, {
      color: "#2563eb",
      weight: 3,
      fillColor: "#2563eb",
      fillOpacity: 0.14
    }).addTo(map).bindPopup("다방 크롤링 검색 범위");

    L.marker(center)
      .addTo(map)
      .bindPopup("검색 중심점<br>37.2772634, 127.0451149")
      .openPopup();

    map.fitBounds(bounds.pad(0.25));
  </script>
</body>
</html>
