<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>알림 설정 - 아주대 월세</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;background:#f5f7fa;color:#222}
a{color:inherit;text-decoration:none}
nav{display:flex;align-items:center;gap:4px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;position:sticky;top:0;z-index:500}
nav .brand{font-weight:700;font-size:16px;margin-right:8px;white-space:nowrap}
nav a{padding:5px 12px;border-radius:20px;font-size:13px;white-space:nowrap}
nav a:hover{background:#f0f0f0}
nav a.active-nav{background:#222;color:#fff}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;vertical-align:middle}
.badge-dabang{background:#FF5C38}.badge-daangn{background:#FF6F00}.badge-zigbang{background:#6366F1}.badge-naver{background:#03C75A}

.page{max-width:800px;margin:0 auto;padding:20px 16px}
h2{font-size:18px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5}

/* Webhook card */
.wh-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.wh-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px #0002;overflow:hidden}
.wh-card-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.wh-label{font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wh-url{font-size:12px;color:#888;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
.wh-status{display:inline-block;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:700}
.wh-status.on{background:#e8f5e9;color:#2e7d32}
.wh-status.off{background:#fafafa;color:#999}
.wh-body{padding:12px 16px;font-size:13px;color:#555;display:flex;flex-direction:column;gap:8px}
.wh-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.wh-row-label{color:#888;min-width:60px;flex-shrink:0}
.chip{display:inline-block;padding:2px 9px;border-radius:12px;font-size:12px;font-weight:600;background:#f0f4ff;color:#3730a3;white-space:nowrap}
.chip.platform-dabang{background:#fff0ec;color:#b93000}
.chip.platform-daangn{background:#fff3e0;color:#b85c00}
.chip.platform-zigbang{background:#f0f0ff;color:#3730a3}
.chip.platform-naver{background:#e8f5e9;color:#1b6b2b}
.chip.event-discovered{background:#e8f5e9;color:#2e7d32}
.chip.event-price_changed{background:#fff8e1;color:#8a5c00}
.chip.event-removed{background:#ffebee;color:#c62828}
.chip.event-reappeared{background:#e3f2fd;color:#1565c0}
.chip.event-detail_changed,.chip.event-agent_changed,.chip.event-image_changed{background:#f5f5f5;color:#666}
.price-filter{font-size:13px;color:#555}
.wh-actions{display:flex;gap:6px;padding:10px 16px;background:#fafafa;border-top:1px solid #f0f0f0}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 13px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s}
.btn:hover{background:#f0f0f0}
.btn-danger{border-color:#ffcccc;color:#c00}
.btn-danger:hover{background:#fff0f0}
.btn-primary{background:#222;color:#fff;border-color:#222}
.btn-primary:hover{background:#333}
.btn-sm{padding:3px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Add form */
.add-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px #0002;padding:20px}
.add-card h3{font-size:15px;font-weight:700;margin-bottom:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px}
.form-group input[type=text],.form-group input[type=url]{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit}
.form-group input:focus{outline:none;border-color:#6366F1;box-shadow:0 0 0 2px #6366f120}
.form-group small{font-size:12px;color:#888;margin-top:3px;display:block}
.check-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.check-group label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;padding:3px 8px;border:1px solid #e0e0e0;border-radius:6px;user-select:none}
.check-group label:hover{background:#f5f5f5}
.check-group input[type=checkbox]{accent-color:#6366F1;cursor:pointer}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.price-row .form-group{margin-bottom:0}
.toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
.toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:#6366F1;cursor:pointer}
.form-actions{display:flex;gap:8px;margin-top:16px}
.hint{background:#f0f4ff;border:1px solid #dde4ff;border-radius:8px;padding:12px 14px;font-size:13px;color:#3730a3;margin-bottom:20px;line-height:1.6}
.empty{text-align:center;padding:30px;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<nav>
  <span class="brand">아주대 월세</span>
  <a href="index.html">지도</a>
  <a href="favorites.html">❤️ 좋아요</a>
  <a href="dabang.html"><span class="badge badge-dabang">다방</span></a>
  <a href="daangn.html"><span class="badge badge-daangn">당근</span></a>
  <a href="zigbang.html"><span class="badge badge-zigbang">직방</span></a>
  <a href="naver.html"><span class="badge badge-naver">네이버</span></a>
  <a href="webhook-settings.html" class="active-nav">🔔 알림</a>
  <span id="userInfo"></span>
</nav>

<div class="page">
  <h2>🔔 Discord 알림 설정</h2>
  <p class="subtitle">Discord 채널의 Webhook URL을 등록하면 원하는 조건의 매물이 변동될 때마다 알림을 받을 수 있습니다.<br>
  최대 5개까지 등록 가능합니다.</p>

  <div class="hint">
    Discord 채널 설정 → 연동 → 웹후크 → 새 웹후크에서 URL을 복사하세요.<br>
    <strong>면적 필터 사용</strong>을 체크하면 내 면적 필터 폴리곤 안의 매물만 알림을 보냅니다.
  </div>

  <div id="whList" class="wh-list"></div>

  <div class="add-card" id="addCard">
    <h3>+ 새 알림 등록</h3>

    <div class="form-group">
      <label>이름 (선택)</label>
      <input type="text" id="fLabel" placeholder="예: 내 방 구하기" maxlength="80">
    </div>

    <div class="form-group">
      <label>Discord Webhook URL *</label>
      <input type="url" id="fUrl" placeholder="https://discord.com/api/webhooks/…">
      <small>Discord 채널 → 연동 → 웹후크에서 복사</small>
    </div>

    <div class="form-group">
      <label>알림 받을 이벤트</label>
      <div class="check-group" id="fEventTypes">
        <label><input type="checkbox" value="discovered" checked> 🆕 신규</label>
        <label><input type="checkbox" value="price_changed" checked> 💰 가격변경</label>
        <label><input type="checkbox" value="removed" checked> ❌ 삭제됨</label>
        <label><input type="checkbox" value="reappeared" checked> ♻️ 재등장</label>
        <label><input type="checkbox" value="detail_changed"> ✏️ 상세변경</label>
        <label><input type="checkbox" value="agent_changed"> 👤 중개사변경</label>
        <label><input type="checkbox" value="image_changed"> 🖼️ 사진변경</label>
      </div>
    </div>

    <div class="form-group">
      <label>플랫폼</label>
      <div class="check-group" id="fPlatforms">
        <label><input type="checkbox" value="dabang" checked> 다방</label>
        <label><input type="checkbox" value="daangn" checked> 당근</label>
        <label><input type="checkbox" value="zigbang" checked> 직방</label>
        <label><input type="checkbox" value="naver_land" checked> 네이버</label>
      </div>
    </div>

    <div class="price-row">
      <div class="form-group">
        <label>최대 보증금 (만원)</label>
        <input type="text" id="fMaxDeposit" placeholder="제한 없음">
      </div>
      <div class="form-group">
        <label>최대 월세 (만원)</label>
        <input type="text" id="fMaxRent" placeholder="제한 없음">
      </div>
    </div>

    <div class="form-group" style="margin-top:14px">
      <label class="toggle-row">
        <input type="checkbox" id="fUseAreaFilter" checked>
        면적 필터 사용 (내 면적 폴리곤 범위 안의 매물만)
      </label>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" id="btnAdd">등록</button>
      <span id="addError" style="font-size:13px;color:#c00;align-self:center"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLATFORM_LABELS = {dabang:'다방',daangn:'당근',zigbang:'직방',naver_land:'네이버'};
const EVENT_LABELS = {
  discovered:'🆕 신규',price_changed:'💰 가격변경',removed:'❌ 삭제됨',
  reappeared:'♻️ 재등장',detail_changed:'✏️ 상세변경',
  agent_changed:'👤 중개사변경',image_changed:'🖼️ 사진변경',
};

function showToast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function maskUrl(url) {
  // Show only the start: https://discord.com/api/webhooks/1234567890/xxx...
  const m = url.match(/^(https:\/\/discord(?:app)?\.com\/api\/webhooks\/\d+\/)(.{6})(.*)$/);
  if (!m) return url;
  return m[1] + m[2] + '…';
}

function renderChips(arr, prefix) {
  return arr.map(v => {
    const label = prefix === 'event' ? (EVENT_LABELS[v] || v) : (PLATFORM_LABELS[v] || v);
    return `<span class="chip ${prefix}-${v}">${label}</span>`;
  }).join('');
}

function renderCard(wh) {
  const priceRows = [];
  if (wh.maxDepositManwon) priceRows.push(`보증 ${wh.maxDepositManwon.toLocaleString()}만 이하`);
  if (wh.maxRentManwon) priceRows.push(`월세 ${wh.maxRentManwon.toLocaleString()}만 이하`);
  const priceStr = priceRows.length ? priceRows.join(' · ') : '제한 없음';

  return `
  <div class="wh-card" data-id="${wh.id}">
    <div class="wh-card-header">
      <div style="flex:1;min-width:0">
        <div class="wh-label">${wh.label || '(이름 없음)'}</div>
        <div class="wh-url">${maskUrl(wh.webhookUrl)}</div>
      </div>
      <span class="wh-status ${wh.isActive ? 'on' : 'off'}">${wh.isActive ? '활성' : '비활성'}</span>
    </div>
    <div class="wh-body">
      <div class="wh-row">
        <span class="wh-row-label">이벤트</span>
        ${renderChips(wh.eventTypes, 'event')}
      </div>
      <div class="wh-row">
        <span class="wh-row-label">플랫폼</span>
        ${renderChips(wh.platforms, 'platform')}
      </div>
      <div class="wh-row">
        <span class="wh-row-label">가격</span>
        <span>${priceStr}</span>
      </div>
      <div class="wh-row">
        <span class="wh-row-label">면적필터</span>
        <span>${wh.useAreaFilter ? '✅ 사용' : '⬜ 미사용'}</span>
      </div>
    </div>
    <div class="wh-actions">
      <button class="btn btn-sm" onclick="toggleActive(${wh.id}, ${!wh.isActive})">
        ${wh.isActive ? '비활성화' : '활성화'}
      </button>
      <button class="btn btn-sm" onclick="testWebhook(${wh.id}, this)">테스트</button>
      <button class="btn btn-sm btn-danger" onclick="deleteWebhook(${wh.id}, this)">삭제</button>
    </div>
  </div>`;
}

async function loadWebhooks() {
  const res = await fetch('/api/user/webhooks');
  const list = await res.json();
  const el = document.getElementById('whList');
  if (!list.length) {
    el.innerHTML = '<div class="empty">등록된 알림이 없습니다.</div>';
    return;
  }
  el.innerHTML = list.map(renderCard).join('');
}

async function toggleActive(id, newState) {
  const res = await fetch(`/api/user/webhooks/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({isActive: newState}),
  });
  if (res.ok) { showToast(newState ? '활성화됐습니다.' : '비활성화됐습니다.'); loadWebhooks(); }
  else showToast('변경 실패');
}

async function testWebhook(id, btn) {
  btn.disabled = true;
  btn.textContent = '전송 중…';
  try {
    const res = await fetch(`/api/user/webhooks/${id}/test`, {method:'POST'});
    if (res.ok) showToast('✅ 테스트 메시지를 보냈습니다!');
    else { const d = await res.json(); showToast('❌ ' + (d.detail || '전송 실패')); }
  } finally {
    btn.disabled = false;
    btn.textContent = '테스트';
  }
}

async function deleteWebhook(id, btn) {
  if (!confirm('이 알림을 삭제할까요?')) return;
  btn.disabled = true;
  const res = await fetch(`/api/user/webhooks/${id}`, {method:'DELETE'});
  if (res.ok || res.status === 204) { showToast('삭제됐습니다.'); loadWebhooks(); }
  else { showToast('삭제 실패'); btn.disabled = false; }
}

function getChecked(containerId) {
  return [...document.querySelectorAll(`#${containerId} input[type=checkbox]:checked`)]
    .map(c => c.value);
}

function parseManwon(v) {
  const n = parseInt(v.replace(/[^0-9]/g, ''), 10);
  return isNaN(n) || n <= 0 ? null : n;
}

document.getElementById('btnAdd').addEventListener('click', async () => {
  const errEl = document.getElementById('addError');
  errEl.textContent = '';
  const url = document.getElementById('fUrl').value.trim();
  if (!url) { errEl.textContent = 'Webhook URL을 입력하세요.'; return; }
  const etypes = getChecked('fEventTypes');
  if (!etypes.length) { errEl.textContent = '이벤트를 하나 이상 선택하세요.'; return; }
  const platforms = getChecked('fPlatforms');
  if (!platforms.length) { errEl.textContent = '플랫폼을 하나 이상 선택하세요.'; return; }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  try {
    const res = await fetch('/api/user/webhooks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        label: document.getElementById('fLabel').value.trim(),
        webhookUrl: url,
        eventTypes: etypes,
        platforms,
        maxDepositManwon: parseManwon(document.getElementById('fMaxDeposit').value),
        maxRentManwon: parseManwon(document.getElementById('fMaxRent').value),
        useAreaFilter: document.getElementById('fUseAreaFilter').checked,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      showToast('✅ 알림이 등록됐습니다.');
      document.getElementById('fLabel').value = '';
      document.getElementById('fUrl').value = '';
      document.getElementById('fMaxDeposit').value = '';
      document.getElementById('fMaxRent').value = '';
      loadWebhooks();
    } else {
      errEl.textContent = data.detail || '등록 실패';
    }
  } finally {
    btn.disabled = false;
  }
});

// Load userInfo
fetch('/api/auth/me').then(r => r.ok ? r.json() : null).then(u => {
  if (u) document.getElementById('userInfo').textContent = u.displayName || u.username;
});

loadWebhooks();
</script>
</body>
</html>
