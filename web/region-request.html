<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>지역 신청 - RentMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;background:#f6f7f9;color:#1f2937}
a{color:inherit;text-decoration:none}
nav{display:flex;align-items:center;gap:4px;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;position:sticky;top:0;z-index:20}
nav .brand{font-weight:700;font-size:16px;margin-right:8px;white-space:nowrap}
nav a{padding:5px 12px;border-radius:20px;font-size:13px;white-space:nowrap}
nav a:hover{background:#f3f4f6}
nav a.active-nav{background:#222;color:#fff}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;vertical-align:middle}
.badge-dabang{background:#326CF9}.badge-daangn{background:#FF6F00}.badge-zigbang{background:#EF4444}.badge-naver{background:#03C75A}
.page{max-width:1080px;margin:0 auto;padding:18px}
.topbar{margin-bottom:14px}
h1{font-size:20px;line-height:1.3;margin-bottom:4px}
.muted{color:#6b7280;font-size:12px}
.section{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:14px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid #e5e7eb}
.section-head h2{font-size:15px}
input,textarea{font-family:inherit;font-size:13px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#111827;width:100%}
input{height:32px;padding:5px 8px}
textarea{padding:8px;resize:vertical;min-height:60px}
.btn{height:32px;padding:5px 11px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#111827;font-family:inherit;font-size:13px;cursor:pointer}
.btn:hover{background:#f3f4f6}
.btn.primary{background:#111827;color:#fff;border-color:#111827}
.btn.primary:hover{background:#374151}
.req-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px}
.req-form .wide{grid-column:1/-1}
.req-form label{display:block;font-size:12px;font-weight:700;color:#4b5563;margin-bottom:4px}
.req-form .pickers{display:flex;flex-direction:column;justify-content:flex-end;gap:6px}
.req-form .pickers .row{display:flex;gap:6px;flex-wrap:wrap}
.req-status{font-size:12px;color:#2563eb;min-height:16px}
.req-status.err{color:#b91c1c}
.mine-table{width:100%;border-collapse:collapse;font-size:13px}
.mine-table th,.mine-table td{padding:9px 10px;text-align:left;border-bottom:1px solid #f3f4f6;vertical-align:top}
.mine-table th{font-size:11px;color:#6b7280;font-weight:700;background:#fafafa;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb}
.mine-table tr:hover td{background:#fafafa}
.status-chip{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:10px;font-size:11px;font-weight:700}
.status-chip.pending{background:#fef3c7;color:#92400e}
.status-chip.approved{background:#dcfce7;color:#166534}
.status-chip.disabled{background:#f3f4f6;color:#4b5563}
.empty{padding:28px;text-align:center;color:#9ca3af}
.help{padding:10px 14px;background:#fafafa;border-bottom:1px solid #f3f4f6;color:#374151;font-size:12px;line-height:1.6}
.help code{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#f3f4f6;padding:1px 5px;border-radius:4px}
@media(max-width:860px){
  .req-form{grid-template-columns:1fr}
  nav{flex-wrap:nowrap;overflow-x:auto}
}
</style>
</head>
<body>
<nav>
  <span class="brand">RentMap</span>
  <a href="index.html">지도</a>
  <a href="favorites.html">찜 목록</a>
  <a href="dabang.html"><span class="badge badge-dabang">다방</span></a>
  <a href="daangn.html"><span class="badge badge-daangn">당근</span></a>
  <a href="zigbang.html"><span class="badge badge-zigbang">직방</span></a>
  <a href="naver.html"><span class="badge badge-naver">네이버</span></a>
  <a href="webhook-settings.html">🔔 알림</a>
  <span id="userInfo"></span>
</nav>

<main class="page">
  <div class="topbar">
    <h1>지역 신청</h1>
    <div class="muted">크롤링하고 싶은 지역의 중심 좌표와 반경을 보내주세요. 관리자가 검토 후 활성화하면 데이터가 들어오기 시작합니다.</div>
  </div>

  <section class="section">
    <div class="section-head"><h2>새 지역 신청</h2></div>
    <div class="help">
      좌표는 네이버/구글/카카오 지도에서 우클릭 → 좌표 보기로 가져올 수 있습니다.
      반경은 일반적으로 <code>1~5km</code>가 적당하며, 너무 크면 크롤 시간이 급격히 늘어 관리자가 보수적으로 조정할 수 있습니다.
    </div>
    <form class="req-form" id="reqForm">
      <div class="wide"><label>지역 이름 (한글 가능)</label>
        <input name="name" required minlength="1" maxlength="80" placeholder="예: 강남역, 회사 근처"></div>
      <div><label>중심 위도</label>
        <input name="center_lat" type="number" step="0.000001" min="-90" max="90" required placeholder="예: 37.498095"></div>
      <div><label>중심 경도</label>
        <input name="center_lng" type="number" step="0.000001" min="-180" max="180" required placeholder="예: 127.027610"></div>
      <div><label>반경 (km, 0.5 ~ 50)</label>
        <input name="radius_km" type="number" step="0.1" min="0.5" max="50" value="3" required></div>
      <div class="pickers">
        <label>좌표 입력 도우미</label>
        <div class="row">
          <button type="button" class="btn" id="useGeoBtn">현재 위치로</button>
          <button type="button" class="btn" id="copyAjouBtn">아주대 좌표</button>
        </div>
      </div>
      <div class="wide"><label>메모 (선택 — 어디인지, 왜 필요한지)</label>
        <textarea name="note" maxlength="500" rows="3"></textarea></div>
      <div class="wide" style="display:flex;gap:10px;align-items:center;margin-top:4px">
        <button class="btn primary" type="submit">신청 보내기</button>
        <span class="req-status" id="reqStatus"></span>
      </div>
    </form>
  </section>

  <section class="section">
    <div class="section-head">
      <h2>내 신청 내역</h2>
      <span class="muted" id="mineCount">0개</span>
    </div>
    <div style="overflow-x:auto">
      <table class="mine-table" id="mineTable">
        <thead>
          <tr>
            <th>이름</th>
            <th>중심 / 반경</th>
            <th>상태</th>
            <th>신청 시각</th>
            <th>승인 시각</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="mineRows"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="auth.js?v=20260526-region1"></script>
<script>
const $ = id => document.getElementById(id);
const STATUS_LABEL = { pending: '검토 대기', approved: '활성', disabled: '비활성/거부' };

function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  return fetch(path, Object.assign({ credentials: 'same-origin', cache: 'no-store', headers }, opts))
    .then(async r => {
      const body = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(body.detail || body.error || r.statusText);
      return body;
    });
}

function escapeHtml(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function fmtTime(v) {
  if (!v) return '-';
  try { return new Date(v).toLocaleString('ko-KR'); } catch (_) { return v; }
}

function fmtCoord(lat, lng) {
  const f = v => (Number(v) || 0).toFixed(5);
  return `${f(lat)}, ${f(lng)}`;
}

function setStatus(text, isErr = false) {
  const el = $('reqStatus');
  el.textContent = text || '';
  el.classList.toggle('err', !!isErr);
}

async function loadMine() {
  // ?mine=1 lets a non-admin caller see their own pending/disabled rows
  // alongside any of theirs that were approved.
  const res = await api('/api/regions?mine=1');
  const rows = res.regions || [];
  $('mineCount').textContent = `${rows.length}개`;
  $('mineRows').innerHTML = rows.map(r => `
    <tr>
      <td>
        <div>${escapeHtml(r.name)}</div>
        <div class="muted"><code>${escapeHtml(r.slug)}</code></div>
      </td>
      <td>
        <div>${escapeHtml(fmtCoord(r.centerLat, r.centerLng))}</div>
        <div class="muted">${escapeHtml(String(r.radiusKm))} km</div>
      </td>
      <td><span class="status-chip ${r.status}">${STATUS_LABEL[r.status] || r.status}</span></td>
      <td><span class="muted">${escapeHtml(fmtTime(r.createdAt))}</span></td>
      <td><span class="muted">${r.approvedAt ? escapeHtml(fmtTime(r.approvedAt)) : '-'}</span></td>
      <td><span class="muted">${escapeHtml(r.note || '-')}</span></td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="empty">아직 신청한 지역이 없습니다.</td></tr>';
}

$('reqForm').addEventListener('submit', async e => {
  e.preventDefault();
  // Capture the form node before awaiting — e.currentTarget becomes null
  // after the synchronous handler returns (same trap as admin.html).
  const form = e.currentTarget || e.target;
  const fd = new FormData(form);
  // Slug is intentionally NOT a user input — the server auto-generates an
  // unguessable identifier and the admin can rename on approval. See
  // scripts/regions.py:_generate_slug for the rationale.
  const body = {
    name: (fd.get('name') || '').trim(),
    center_lat: Number(fd.get('center_lat')),
    center_lng: Number(fd.get('center_lng')),
    radius_km: Number(fd.get('radius_km')),
    note: (fd.get('note') || '').trim() || null,
  };
  setStatus('신청 중...');
  try {
    await api('/api/regions', { method: 'POST', body: JSON.stringify(body) });
  } catch (err) {
    setStatus(err.message, true);
    return;
  }
  if (form && typeof form.reset === 'function') form.reset();
  form.querySelector('input[name="radius_km"]').value = '3';
  setStatus('신청을 보냈습니다. 관리자가 검토 후 활성화됩니다.');
  loadMine().catch(err => setStatus(err.message, true));
});

$('useGeoBtn').addEventListener('click', () => {
  if (!navigator.geolocation) {
    setStatus('이 브라우저는 위치 정보를 지원하지 않습니다.', true);
    return;
  }
  setStatus('현재 위치 가져오는 중...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      $('reqForm').center_lat.value = pos.coords.latitude.toFixed(6);
      $('reqForm').center_lng.value = pos.coords.longitude.toFixed(6);
      setStatus('현재 위치를 채웠습니다.');
    },
    err => setStatus(`위치 정보 실패: ${err.message}`, true),
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
});

$('copyAjouBtn').addEventListener('click', () => {
  // Convenience for demo / first-time users.
  $('reqForm').center_lat.value = '37.280062';
  $('reqForm').center_lng.value = '127.043688';
  setStatus('아주대 기본 좌표를 채웠습니다.');
});

Auth.me().then(user => {
  if (!user) return; // middleware will already have bounced to /login.html
  loadMine().catch(err => setStatus(err.message, true));
});
</script>
</body>
</html>
