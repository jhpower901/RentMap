<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__TITLE__ - 아주대 월세 매물</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="listing-data-source.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;background:#f5f7fa;color:#222}
a{color:inherit;text-decoration:none}
nav{display:flex;align-items:center;gap:4px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;position:sticky;top:0;z-index:500}
nav .brand{font-weight:700;font-size:16px;margin-right:8px;white-space:nowrap}
nav a{padding:5px 12px;border-radius:20px;font-size:13px;white-space:nowrap}
nav a:hover{background:#f0f0f0}
nav a.active-nav{background:#222 !important;color:#fff !important}
.page{max-width:1440px;margin:0 auto;padding:16px}
h1{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;vertical-align:middle}
.badge-dabang{background:#FF5C38}
.badge-daangn{background:#FF6F00}
.badge-zigbang{background:#6366F1}
.badge-naver{background:#03C75A}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;background:#fff;padding:10px 12px;border-radius:8px;box-shadow:0 1px 3px #0001}
.controls label{font-size:13px;display:flex;align-items:center;gap:4px}
.controls input[type=number]{width:74px;padding:4px 6px;border:1px solid #ccc;border-radius:5px;font-size:13px}
.controls select,.controls input[type=text]{padding:5px 8px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.count{font-size:13px;color:#666;margin-left:auto;font-weight:600}
.layout{display:grid;grid-template-columns:1fr minmax(360px,400px);gap:14px;align-items:stretch}
.layout>div:last-child{align-self:stretch;min-height:100%}
@media(max-width:960px){body{overflow:hidden}nav{position:relative;flex-wrap:nowrap;overflow-x:auto}nav .brand,nav a{flex:0 0 auto}.page{height:calc(100dvh - 45px);padding:10px;display:flex;flex-direction:column;overflow:hidden}h1{display:none}.controls{margin-bottom:10px;flex:0 0 auto;flex-wrap:nowrap;overflow-x:auto}.controls label,.controls input,.controls select{flex:0 0 auto}.layout{display:flex;flex:1 1 auto;min-height:0;flex-direction:column}.layout>div:last-child{order:-1;flex:0 0 auto;min-height:auto}.table-wrap{flex:1 1 auto;min-height:0;overflow:auto}.count{margin-left:0}}
.map-box{height:min(620px,calc(100vh - 76px));min-height:420px;border-radius:10px;overflow:hidden;border:1px solid #ddd;position:sticky;top:60px;z-index:10}
@media(max-width:960px){.map-box{position:relative;top:auto;height:34dvh;min-height:220px;max-height:360px;flex:0 0 auto}}
.table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px #0001}
table{width:100%;border-collapse:collapse;background:#fff;min-width:780px}
th{background:#f0f0f0;padding:8px 10px;text-align:left;font-size:12px;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid #e0e0e0}
th:hover{background:#e4e4e4}
th .sort-arrow{font-size:10px;margin-left:2px;opacity:0.5}
th.sorted .sort-arrow{opacity:1;color:__ACCENT__}
td{padding:7px 10px;border-top:1px solid #f0f0f0;vertical-align:middle;font-size:13px}
tr:hover td{background:#fafafa;cursor:pointer}
.img-thumb{width:68px;height:51px;object-fit:cover;border-radius:5px}
.no-img{width:68px;height:51px;background:#eee;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;text-align:center;line-height:1.3}
.price{font-weight:600}
.total-price{color:#c00;font-weight:700}
.agency-cell{font-size:12px;line-height:1.5;max-width:140px}
.phone{color:#666;font-size:11px}
.link-btn{display:inline-block;padding:3px 10px;border:1px solid #ccc;border-radius:5px;font-size:12px;white-space:nowrap}
.link-btn:hover{background:#eee}
.note-warn{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;line-height:1.6}
.leaflet-popup-content{font-size:13px;line-height:1.7;min-width:210px;max-width:260px}
.popup-title{font-weight:700;margin-bottom:4px;font-size:14px;line-height:1.4}
.popup-price{color:#c00;font-weight:700;font-size:15px}
.popup-img{width:100%;max-height:130px;object-fit:cover;border-radius:6px;margin:5px 0}
.popup-meta{color:#555;font-size:12px}
</style>
</head>
<body>
<nav>
  <span class="brand">🏠 아주대 월세</span>
  <a href="index.html">지도 전체</a>
  <a href="dabang.html" data-src="dabang"><span class="badge badge-dabang">다방</span></a>
  <a href="daangn.html" data-src="daangn"><span class="badge badge-daangn">당근</span></a>
  <a href="zigbang.html" data-src="zigbang"><span class="badge badge-zigbang">직방</span></a>
  <a href="naver.html" data-src="naver"><span class="badge badge-naver">네이버</span></a>
</nav>
<div class="page">
  <h1>
    <span class="badge badge-__SOURCE__" style="font-size:15px;padding:5px 14px">__TITLE__</span>
    매물 목록
  </h1>
  __EXTRA_NOTE__
  <div class="controls">
    <label>보증금 최대
      <input type="number" id="maxDeposit" value="3000" min="0" max="10000" step="100"> 만원
    </label>
    <label>월세 최대
      <input type="number" id="maxRent" value="60" min="0" max="200" step="5"> 만원
    </label>
    <label>방 유형
      <select id="typeFilter"><option value="">전체</option></select>
    </label>
    <input type="text" id="search" placeholder="검색 (지역·중개사무소·제목)..." style="min-width:180px">
    <span class="count" id="countLabel">0건</span>
  </div>
  <div class="layout">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:76px">사진</th>
            <th data-col="deposit" data-num="1">보증금<span class="sort-arrow">▼</span></th>
            <th data-col="rent" data-num="1" class="sorted">월세<span class="sort-arrow">▼</span></th>
            <th data-col="maint" data-num="1">관리비<span class="sort-arrow">▼</span></th>
            <th data-col="total" data-num="1">총월납부<span class="sort-arrow">▼</span></th>
            <th data-col="type">방유형<span class="sort-arrow">▼</span></th>
            <th data-col="area">면적<span class="sort-arrow">▼</span></th>
            <th data-col="floor">층<span class="sort-arrow">▼</span></th>
            <th data-col="address">주소<span class="sort-arrow">▼</span></th>
            <th data-col="agency">중개사무소<span class="sort-arrow">▼</span></th>
            <th>링크</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div>
      <div class="map-box" id="map"></div>
    </div>
  </div>
</div>
<script>
const SOURCE = "__SOURCE__";
const ACCENT = "__ACCENT__";

(async function() {
  const DATA = await window.loadPlatformListings(SOURCE);

  // Mark active nav
  document.querySelectorAll('nav a[data-src]').forEach(a => {
    if (a.dataset.src === SOURCE) a.classList.add('active-nav');
  });

  // Populate type filter
  const types = [...new Set(DATA.map(r => r.type).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
  const sel = document.getElementById('typeFilter');
  types.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });

  // Map init
  const ajouLat = 37.2785, ajouLon = 127.0434;
  const mapCenter = DATA.some(r => r.lat && r.lat > 37.3) ? [37.365, 127.11] : [ajouLat, ajouLon];
  const map = L.map('map').setView(mapCenter, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom: 19
  }).addTo(map);

  if (mapCenter[0] === ajouLat) {
    L.marker([ajouLat, ajouLon]).addTo(map)
      .bindPopup('<b>아주대학교 정문</b>');
  }

  const allMarkers = [];
  DATA.forEach(r => {
    if (!r.lat || !r.lon || r.lat === 0 || r.lon === 0) return;
    const m = L.circleMarker([r.lat, r.lon], {
      radius: 7, fillColor: ACCENT, color: '#fff', weight: 2, fillOpacity: 0.85
    }).addTo(map);

    const imgHtml = r.img1
      ? `<img class="popup-img" src="${r.img1}" onerror="this.style.display='none'">`
      : '';
    const agencyLabel = SOURCE === 'daangn'
      ? (r.agency === 'DIRECT' ? '직거래' : '중개사')
      : (r.agency || '');

    m.bindPopup(`<div class="popup-title">${r.title || ''}</div>
${imgHtml}
<div class="popup-price">보 ${fmtDeposit(r.deposit)} / 월 ${fmtRent(r.rent)}</div>
<div class="popup-meta">관리비 ${fmtRent(r.maint)} &nbsp;|&nbsp; 총 <b>${fmtRent(r.total)}</b></div>
<div class="popup-meta">${r.type || ''} &nbsp;|&nbsp; ${r.floor || ''}</div>
<div class="popup-meta">${agencyLabel}${r.phone ? ' ' + r.phone : ''}</div>
<div class="popup-meta" style="word-break:break-all">${r.address || r.region || ''}</div>
<div style="margin-top:6px">
  <a href="${r.url}" target="_blank" class="link-btn">매물 보기 →</a>
</div>`);

    allMarkers.push({ marker: m, data: r });
  });

  // Sorting state
  let sortCol = 'rent', sortAsc = true;

  function fmtDeposit(v) {
    if (v === null || v === undefined || v === '') return '-';
    if (v >= 10000) return (v / 10000).toFixed(1).replace(/\.0$/, '') + '억';
    return v + '만';
  }
  function fmtRent(v) {
    if (v === null || v === undefined || v === '') return '-';
    return v + '만';
  }
  function fmtArea(v) {
    if (!v && v !== 0) return '-';
    const n = parseFloat(v);
    if (isNaN(n)) return v || '-';
    return n.toFixed(1) + 'm²';
  }
  // Expose fmtDeposit/fmtRent for popup closures
  window.fmtDeposit = fmtDeposit;
  window.fmtRent = fmtRent;

  function sortArr(arr) {
    return [...arr].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) va = sortAsc ? Infinity : -Infinity;
      if (vb === null || vb === undefined) vb = sortAsc ? Infinity : -Infinity;
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb, 'ko') : vb.localeCompare(va, 'ko');
      return sortAsc ? va - vb : vb - va;
    });
  }

  function getFiltered() {
    const maxDep  = parseFloat(document.getElementById('maxDeposit').value) || 99999;
    const maxRent = parseFloat(document.getElementById('maxRent').value) || 9999;
    const type    = document.getElementById('typeFilter').value;
    const q       = document.getElementById('search').value.toLowerCase();
    return DATA.filter(r => {
      if (r.deposit !== null && r.deposit !== undefined && r.deposit > maxDep) return false;
      if (r.rent    !== null && r.rent    !== undefined && r.rent    > maxRent) return false;
      if (type && r.type !== type) return false;
      if (q) {
        const hay = [r.title, r.address, r.region, r.agency, r.type].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function render() {
    const filtered = sortArr(getFiltered());
    document.getElementById('countLabel').textContent = filtered.length + '건';

    const visibleIds = new Set(filtered.map(r => r.id));
    allMarkers.forEach(({ marker, data }) => {
      if (visibleIds.has(data.id)) {
        marker.setStyle({ fillOpacity: 0.85, opacity: 1 });
      } else {
        marker.setStyle({ fillOpacity: 0.1, opacity: 0.2 });
      }
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    filtered.forEach(r => {
      const agencyLabel = SOURCE === 'daangn'
        ? (r.agency === 'DIRECT' ? '직거래' : '중개사')
        : (r.agency || '-');

      const tr = document.createElement('tr');
      tr.innerHTML = r.img1
        ? `<td><img class="img-thumb" src="${r.img1}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'>사진없음</div>'"></td>`
        : `<td><div class="no-img">사진<br>없음</div></td>`;
      tr.innerHTML += `
        <td class="price">${fmtDeposit(r.deposit)}</td>
        <td class="price">${fmtRent(r.rent)}</td>
        <td>${fmtRent(r.maint)}</td>
        <td class="total-price">${fmtRent(r.total)}</td>
        <td>${r.type || '-'}</td>
        <td>${fmtArea(r.area)}</td>
        <td>${r.floor || '-'}</td>
        <td style="max-width:160px;word-break:break-all;font-size:12px">${r.address || r.region || '-'}</td>
        <td class="agency-cell">${agencyLabel}${r.phone ? '<br><span class="phone">' + r.phone + '</span>' : ''}</td>
        <td><a href="${r.url}" target="_blank" class="link-btn">보기</a></td>`;

      tr.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        const m = allMarkers.find(x => x.data.id === r.id);
        if (m && r.lat && r.lon) {
          map.flyTo([r.lat, r.lon], 17, { duration: 0.6 });
          m.marker.openPopup();
        }
      });
      tbody.appendChild(tr);
    });
  }

  // Sort on header click
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = (th.dataset.num === '1'); // numeric: ascending first; text: ascending first
      }
      document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      render();
    });
  });

  ['maxDeposit', 'maxRent', 'typeFilter', 'search'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
  });

  render();
})().catch(error => {
  console.error(error);
  document.getElementById('countLabel').textContent = 'CSV 로드 실패';
});
</script>
</body>
</html>
