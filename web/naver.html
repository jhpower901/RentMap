const SOURCE = "naver";
const ACCENT = "#03C75A";

(function() {
  // Mark active nav
  document.querySelectorAll('nav a[data-src]').forEach(a => {
    if (a.dataset.src === SOURCE) a.classList.add('active-nav');
  });

  // Populate type filter
  const types = [...new Set(DATA.map(r => r.type).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
  const sel = document.getElementById('typeFilter');
  types.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });

  // Map init
  const ajouLat = 37.2785, ajouLon = 127.0434;
  const mapCenter = DATA.some(r => r.lat && r.lat > 37.3) ? [37.365, 127.11] : [ajouLat, ajouLon];
  const map = L.map('map').setView(mapCenter, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom: 19
  }).addTo(map);

  if (mapCenter[0] === ajouLat) {
    L.marker([ajouLat, ajouLon]).addTo(map)
      .bindPopup('<b>아주대학교 정문</b>');
  }

  const allMarkers = [];
  DATA.forEach(r => {
    if (!r.lat || !r.lon || r.lat === 0 || r.lon === 0) return;
    const m = L.circleMarker([r.lat, r.lon], {
      radius: 7, fillColor: ACCENT, color: '#fff', weight: 2, fillOpacity: 0.85
    }).addTo(map);

    const imgHtml = r.img1
      ? `<img class="popup-img" src="${r.img1}" onerror="this.style.display='none'">`
      : '';
    const agencyLabel = SOURCE === 'daangn'
      ? (r.agency === 'DIRECT' ? '직거래' : '중개사')
      : (r.agency || '');

    m.bindPopup(`<div class="popup-title">${r.title || ''}</div>
${imgHtml}
<div class="popup-price">보 ${fmtDeposit(r.deposit)} / 월 ${fmtRent(r.rent)}</div>
<div class="popup-meta">관리비 ${fmtRent(r.maint)} &nbsp;|&nbsp; 총 <b>${fmtRent(r.total)}</b></div>
<div class="popup-meta">${r.type || ''} &nbsp;|&nbsp; ${r.floor || ''}</div>
<div class="popup-meta">${agencyLabel}${r.phone ? ' ' + r.phone : ''}</div>
<div class="popup-meta" style="word-break:break-all">${r.address || r.region || ''}</div>
<div style="margin-top:6px">
  <a href="${r.url}" target="_blank" class="link-btn">매물 보기 →</a>
</div>`);

    allMarkers.push({ marker: m, data: r });
  });

  // Sorting state
  let sortCol = 'rent', sortAsc = true;

  function fmtDeposit(v) {
    if (v === null || v === undefined || v === '') return '-';
    if (v >= 10000) return (v / 10000).toFixed(1).replace(/\.0$/, '') + '억';
    return v + '만';
  }
  function fmtRent(v) {
    if (v === null || v === undefined || v === '') return '-';
    return v + '만';
  }
  function fmtArea(v) {
    if (!v && v !== 0) return '-';
    const n = parseFloat(v);
    if (isNaN(n)) return v || '-';
    return n.toFixed(1) + 'm²';
  }
  // Expose fmtDeposit/fmtRent for popup closures
  window.fmtDeposit = fmtDeposit;
  window.fmtRent = fmtRent;

  function sortArr(arr) {
    return [...arr].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) va = sortAsc ? Infinity : -Infinity;
      if (vb === null || vb === undefined) vb = sortAsc ? Infinity : -Infinity;
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb, 'ko') : vb.localeCompare(va, 'ko');
      return sortAsc ? va - vb : vb - va;
    });
  }

  function getFiltered() {
    const maxDep  = parseFloat(document.getElementById('maxDeposit').value) || 99999;
    const maxRent = parseFloat(document.getElementById('maxRent').value) || 9999;
    const type    = document.getElementById('typeFilter').value;
    const q       = document.getElementById('search').value.toLowerCase();
    return DATA.filter(r => {
      if (r.deposit !== null && r.deposit !== undefined && r.deposit > maxDep) return false;
      if (r.rent    !== null && r.rent    !== undefined && r.rent    > maxRent) return false;
      if (type && r.type !== type) return false;
      if (q) {
        const hay = [r.title, r.address, r.region, r.agency, r.type].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function render() {
    const filtered = sortArr(getFiltered());
    document.getElementById('countLabel').textContent = filtered.length + '건';

    const visibleIds = new Set(filtered.map(r => r.id));
    allMarkers.forEach(({ marker, data }) => {
      if (visibleIds.has(data.id)) {
        marker.setStyle({ fillOpacity: 0.85, opacity: 1 });
      } else {
        marker.setStyle({ fillOpacity: 0.1, opacity: 0.2 });
      }
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    filtered.forEach(r => {
      const agencyLabel = SOURCE === 'daangn'
        ? (r.agency === 'DIRECT' ? '직거래' : '중개사')
        : (r.agency || '-');

      const tr = document.createElement('tr');
      tr.innerHTML = r.img1
        ? `<td><img class="img-thumb" src="${r.img1}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'>사진없음</div>'"></td>`
        : `<td><div class="no-img">사진<br>없음</div></td>`;
      tr.innerHTML += `
        <td class="price">${fmtDeposit(r.deposit)}</td>
        <td class="price">${fmtRent(r.rent)}</td>
        <td>${fmtRent(r.maint)}</td>
        <td class="total-price">${fmtRent(r.total)}</td>
        <td>${r.type || '-'}</td>
        <td>${fmtArea(r.area)}</td>
        <td>${r.floor || '-'}</td>
        <td style="max-width:160px;word-break:break-all;font-size:12px">${r.address || r.region || '-'}</td>
        <td class="agency-cell">${agencyLabel}${r.phone ? '<br><span class="phone">' + r.phone + '</span>' : ''}</td>
        <td><a href="${r.url}" target="_blank" class="link-btn">보기</a></td>`;

      tr.addEventListener('click', e => {
        if (e.target.tagName === 'A') return;
        const m = allMarkers.find(x => x.data.id === r.id);
        if (m && r.lat && r.lon) {
          map.flyTo([r.lat, r.lon], 17, { duration: 0.6 });
          m.marker.openPopup();
        }
      });
      tbody.appendChild(tr);
    });
  }

  // Sort on header click
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = (th.dataset.num === '1'); // numeric: ascending first; text: ascending first
      }
      document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      render();
    });
  });

  ['maxDeposit', 'maxRent', 'typeFilter', 'search'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
  });

  render();
})();
</script>
